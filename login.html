<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#0a0a0a;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#111;
  padding:40px;
  border-radius:12px;
  text-align:center;
  width:300px;
}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}
button{
  background:#c9a227;
  color:white;
  padding:12px;
  width:100%;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h1 style="color:white;">Admin Login</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="loginUser()">Login</button>
</div>

<script>
const SUPABASE_URL = "https://spccpsrnjbbxowsngmpr.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_69gnGhxaQTcNyDC6oXt17A_3BeWsZZa
";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loginUser(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const {data,error}=await client.auth.signInWithPassword({
    email:email,
    password:password
  });

  if(error){
    alert("Wrong email or password");
    return;
  }

  alert("Login success");
  window.location.href="admin-dashboard.html";
}
</script>

</body>
</html>
