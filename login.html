<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login – HOPE Preparations</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="../assets/images/logo.png" alt="HOPE Logo" onerror="this.style.display='none'"/>
      <h1>HOPE Preparations</h1>
      <p>Student Portal – Login to your account</p>
    </div>
    <div id="loginMsg" class="alert" style="display:none;"></div>
    <form id="loginForm" data-type="student">
      <div class="form-group">
        <label for="loginUsername"><i class="fas fa-user"></i> Username</label>
        <input type="text" id="loginUsername" placeholder="Enter your username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
      <button type="<button type="button" class="btn-primary" style="width:100%; margin-top:8px;" onclick="loginStudent()">
   Login <i class="fas fa-sign-in-alt"></i>
</button>"></i></button>
    </form>
    <p style="text-align:center; margin-top:20px; font-size:0.85rem; color:var(--text-muted);">
      Admin? <a href="admin-login.html" style="color:var(--primary); font-weight:700;">Admin Login</a>
    </p>
    <p style="text-align:center; margin-top:10px; font-size:0.82rem; color:var(--text-muted);">
      <strong>Demo:</strong> username: <code>student1</code> | password: <code>hope123</code>
    </p>
    <p style="text-align:center; margin-top:16px;"><a href="../index.html" style="color:var(--accent); font-size:0.85rem;"><i class="fas fa-arrow-left"></i> Back to Website</a></p>
  </div>
</div>
<script src="../js/script.js"></script>
  </script><script src="../js/script.js"></script>

<script>
function loginStudent() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(username === "student" && password === "student123"){
        window.location.href = "student-dashboard.html";
    } else {
        alert("Invalid Student Login");
    }
}
</script>

</body>
</html>
</body>
</html>
